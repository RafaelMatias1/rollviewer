<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="14" fill="#0a0b0e"/>
  <!-- Crosshair icon -->
  <circle cx="32" cy="32" r="10" stroke="#f0b429" stroke-width="2.5" fill="none"/>
  <circle cx="32" cy="32" r="2.5" fill="#f0b429"/>
  <!-- Top line -->
  <line x1="32" y1="10" x2="32" y2="20" stroke="#f0b429" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Bottom line -->
  <line x1="32" y1="44" x2="32" y2="54" stroke="#f0b429" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Left line -->
  <line x1="10" y1="32" x2="20" y2="32" stroke="#f0b429" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right line -->
  <line x1="44" y1="32" x2="54" y2="32" stroke="#f0b429" stroke-width="2.5" stroke-linecap="round"/>
</svg>
